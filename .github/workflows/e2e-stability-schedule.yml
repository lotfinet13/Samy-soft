# Nightly flake detection — does not block PRs; uploads metrics artifact.
name: e2e-stability-nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  stability:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:stability -- --runs=3
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-stability-metrics
          path: docs/e2e-stability-metrics.md
          retention-days: 30
